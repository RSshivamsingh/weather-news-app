<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Weather Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="container mx-auto px-4 py-10">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-blue-800">Weather & News Pipeline</h1>
            <p class="text-gray-600 mt-2">Status: <span class="text-green-500 font-bold">Running in Docker</span></p>
        </header>

        <div class="flex flex-wrap -mx-4">
            <div class="w-full lg:w-1/3 px-4 mb-8">
                <div class="bg-gradient-to-br from-blue-500 to-blue-700 rounded-3xl p-8 text-white shadow-2xl">
                    <h2 class="text-2xl font-semibold opacity-90">{{ weather.city }}</h2>
                    <div class="flex items-center my-6">
                        <span class="text-7xl font-bold">{{ weather.temp }}°C</span>
                    </div>
                    <p class="text-xl capitalize tracking-wide">{{ weather.description }}</p>
                </div>
            </div>

            <div class="w-full lg:w-2/3 px-4">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">Top Headlines</h2>
                <div class="space-y-4">
                    {% for item in news %}
                    <div class="bg-white p-6 rounded-2xl shadow-md border-l-8 border-blue-500 hover:shadow-lg transition">
                        <h3 class="text-xl font-bold text-gray-900">{{ item.title }}</h3>
                        <p class="text-gray-600 mt-2">{{ item.description }}</p>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
